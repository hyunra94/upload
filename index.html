<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📁 파일 업로드</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📁</text></svg>" />
  <meta property="og:title" content="파일 업로드" />
  <meta property="og:image" content="https://hyunra94.github.io/assets/og-default.png" />
  <meta property="og:url" content="https://hyunra94.github.io/upload/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f3ef;
      --surface: #ffffff;
      --border: #e8ddd4;
      --pink: #f2a7b8;
      --pink-light: #fce8ed;
      --pink-deep: #e07f96;
      --green: #a8c5a0;
      --green-light: #e8f5e5;
      --text: #3a2e2e;
      --text-sub: #8a7070;
      --shadow: 0 4px 20px rgba(180,130,130,0.12);
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(circle at 20% 20%, #fce8ed55 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #e8f5e555 0%, transparent 50%);
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1.5px solid var(--border);
      width: 100%;
      max-width: 520px;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, var(--pink-light) 0%, var(--green-light) 100%);
      padding: 24px 32px 16px;
      border-bottom: 1.5px solid var(--border);
    }
    .card-header h1 { font-size: 20px; font-weight: 700; color: var(--text); }
    .card-header p { font-size: 12px; color: var(--text-sub); margin-top: 3px; }

    .key-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-bottom: 1.5px solid var(--border);
      background: #fdfbf9;
    }
    .key-bar label { font-size: 13px; font-weight: 500; color: var(--text-sub); white-space: nowrap; }
    .key-bar input {
      flex: 1;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    .key-bar input:focus { border-color: var(--pink); }

    .tabs { display: flex; border-bottom: 1.5px solid var(--border); }
    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-sub);
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: var(--pink-deep);
      border-bottom-color: var(--pink-deep);
      background: var(--pink-light);
    }

    .tab-panel { display: none; padding: 24px 32px; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 18px; }

    .dropzone {
      border: 2px dashed var(--pink);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
      position: relative;
    }
    .dropzone:hover, .dropzone.drag-over { background: var(--pink-light); border-color: var(--pink-deep); }
    .dropzone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .dropzone-icon { font-size: 32px; margin-bottom: 8px; }
    .dropzone p { font-size: 14px; font-weight: 500; color: var(--text); }
    .dropzone span { font-size: 12px; color: var(--text-sub); margin-top: 4px; display: block; }

    .file-list { display: flex; flex-direction: column; gap: 7px; }
    .file-item {
      display: flex; align-items: center; gap: 8px;
      background: var(--pink-light); border-radius: 9px; padding: 9px 12px; font-size: 13px;
    }
    .file-item .file-name {
      flex: 1; color: var(--text); font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .file-item .file-size { color: var(--text-sub); font-size: 12px; flex-shrink: 0; }
    .file-item .remove-btn {
      background: none; border: none; cursor: pointer;
      color: var(--pink-deep); font-size: 15px; padding: 0; flex-shrink: 0; line-height: 1;
    }

    .progress-wrap { display: none; }
    .progress-wrap.show { display: block; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--text-sub); margin-bottom: 6px;
    }
    .progress-bar-bg { background: var(--border); border-radius: 100px; height: 8px; overflow: hidden; }
    .progress-bar-fill {
      background: linear-gradient(90deg, var(--pink), var(--green));
      height: 100%; border-radius: 100px; width: 0%; transition: width 0.3s ease;
    }

    .upload-btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--pink) 0%, var(--green) 100%);
      border: none; border-radius: 12px; color: #fff;
      font-size: 15px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .upload-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .upload-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .result-box { display: none; flex-direction: column; gap: 8px; }
    .result-box.show { display: flex; }

    .error-box {
      display: none; background: #fff0f0; border: 1.5px solid #f5b8b8;
      border-radius: 10px; padding: 11px 14px; font-size: 13px; color: #c0392b;
    }
    .error-box.show { display: block; }

    /* 파일 카드 */
    .fcard {
      background: var(--green-light); border: 1.5px solid var(--green);
      border-radius: 10px; padding: 11px 14px;
    }
    .fcard-name {
      font-size: 12px; color: var(--text-sub); margin-bottom: 5px;
      display: flex; align-items: center; gap: 5px;
    }
    .fcard-meta { margin-left: auto; font-size: 11px; color: var(--text-sub); }
    .fcard-row { display: flex; align-items: center; gap: 8px; }
    .fcard-link {
      flex: 1; font-size: 12px; color: var(--text); word-break: break-all;
      background: #fff; border: 1px solid var(--border); border-radius: 7px;
      padding: 6px 10px; font-family: monospace;
    }
    .copy-btn {
      background: var(--pink); border: none; border-radius: 7px; color: #fff;
      font-size: 12px; font-family: 'Noto Sans KR', sans-serif;
      padding: 6px 12px; cursor: pointer; white-space: nowrap;
      transition: background 0.2s; flex-shrink: 0;
    }
    .copy-btn:hover { background: var(--pink-deep); }
    .copy-btn.copied { background: var(--green); }

    /* 목록 탭 */
    .list-header { display: flex; align-items: center; justify-content: space-between; }
    .list-header span { font-size: 13px; color: var(--text-sub); }
    .refresh-btn {
      background: none; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 6px 12px; font-size: 12px; font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-sub); cursor: pointer; transition: all 0.2s;
    }
    .refresh-btn:hover { border-color: var(--pink); color: var(--pink-deep); }

    .list-loading, .list-empty {
      text-align: center; padding: 32px; color: var(--text-sub); font-size: 13px;
    }
    .list-items { display: flex; flex-direction: column; gap: 8px; }

    .date-divider {
      font-size: 11px; font-weight: 700; color: var(--text-sub);
      letter-spacing: 0.5px; padding: 4px 0 2px;
      border-bottom: 1px solid var(--border);
    }

    .expire-note { text-align: center; font-size: 11px; color: var(--text-sub); }

    .demo-badge {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #fff8e1;
      border: 1.5px solid #ffe082;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      color: #8a6a00;
      font-weight: 500;
    }
    .demo-badge.show { display: flex; }
  </style>
</head>
<body>

<div class="card">

  <div class="card-header">
    <h1>📁 파일 업로드</h1>
    <p>비밀키 입력 후 파일을 올리거나 목록을 확인하세요 · 7일 후 자동 삭제</p>
  </div>

  <div class="key-bar">
    <label>🔑 비밀키</label>
    <input type="password" id="secretKey" placeholder="비밀키를 입력하세요" />
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="upload">⬆️ 업로드</button>
    <button class="tab-btn" data-tab="list">📋 내 파일 목록</button>
  </div>

  <!-- 업로드 탭 -->
  <div class="tab-panel active" id="tab-upload">
    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" multiple />
      <div class="dropzone-icon">📂</div>
      <p>파일을 드래그하거나 클릭해서 선택</p>
      <span>최대 5GB · 여러 파일 동시 업로드 가능</span>
    </div>
    <div class="file-list" id="fileList"></div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label">
        <span id="progressText">업로드 중...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="demo-badge" id="demoBadge">🧪 데모 모드 — 실제 업로드 없이 시뮬레이션만 실행됩니다</div>
    <div class="error-box" id="errorBox"></div>
    <div class="result-box" id="resultBox"></div>
    <button class="upload-btn" id="uploadBtn" disabled>업로드</button>
    <p class="expire-note">🗓 업로드된 파일은 7일 후 자동으로 삭제됩니다</p>
  </div>

  <!-- 목록 탭 -->
  <div class="tab-panel" id="tab-list">
    <div class="list-header">
      <span id="listCount">R2에 저장된 파일 목록</span>
      <button class="refresh-btn" id="refreshBtn">🔄 새로고침</button>
    </div>
    <div class="error-box" id="listErrorBox"></div>
    <div id="listContent">
      <div class="list-empty">비밀키를 입력하고 새로고침을 눌러주세요 🔑</div>
    </div>
    <p class="expire-note">🗓 업로드된 파일은 7일 후 자동으로 삭제됩니다</p>
  </div>

</div>

<script>
  const WORKER_URL = 'https://notion-proxy.abyss9405.workers.dev';
  const DEMO_KEY = 'test'; // 이 키 입력 시 데모 모드

  const secretKeyInput = document.getElementById('secretKey');
  const demoBadge = document.getElementById('demoBadge');
  const getSecret = () => secretKeyInput.value.trim();
  const isDemo = () => getSecret() === DEMO_KEY;

  secretKeyInput.addEventListener('input', () => {
    demoBadge.classList.toggle('show', isDemo());
  });

  // ── 탭 전환
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'list') loadList();
    });
  });

  // ── 공통 유틸
  function formatSize(bytes) {
    if (!bytes) return '';
    if (bytes < 1024) return bytes + 'B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
    if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + 'MB';
    return (bytes / 1024 / 1024 / 1024).toFixed(2) + 'GB';
  }

  function makeCopyBtn(url) {
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '복사';
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(url).then(() => {
        btn.textContent = '✅ 복사됨';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
      });
    });
    return btn;
  }

  function makeFcard({ name, url, size }) {
    const card = document.createElement('div');
    card.className = 'fcard';
    const nameRow = document.createElement('div');
    nameRow.className = 'fcard-name';
    nameRow.innerHTML = `<span>📄 ${name}</span>`;
    if (size) {
      const meta = document.createElement('span');
      meta.className = 'fcard-meta';
      meta.textContent = formatSize(size);
      nameRow.appendChild(meta);
    }
    const row = document.createElement('div');
    row.className = 'fcard-row';
    const linkEl = document.createElement('div');
    linkEl.className = 'fcard-link';
    linkEl.textContent = url;
    row.appendChild(linkEl);
    row.appendChild(makeCopyBtn(url));
    card.appendChild(nameRow);
    card.appendChild(row);
    return card;
  }

  // ── 업로드 탭
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileListEl = document.getElementById('fileList');
  const uploadBtn = document.getElementById('uploadBtn');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const progressPct = document.getElementById('progressPct');
  const resultBox = document.getElementById('resultBox');
  const errorBox = document.getElementById('errorBox');

  let selectedFiles = [];

  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag-over'); addFiles([...e.dataTransfer.files]); });
  fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value = ''; });

  function addFiles(files) {
    files.forEach(f => { if (!selectedFiles.find(x => x.name === f.name && x.size === f.size)) selectedFiles.push(f); });
    renderFileList();
  }

  function renderFileList() {
    fileListEl.innerHTML = '';
    selectedFiles.forEach((f, i) => {
      const item = document.createElement('div');
      item.className = 'file-item';
      item.innerHTML = `<span>📄</span><span class="file-name">${f.name}</span><span class="file-size">${formatSize(f.size)}</span><button class="remove-btn" data-i="${i}">✕</button>`;
      fileListEl.appendChild(item);
    });
    fileListEl.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => { selectedFiles.splice(Number(btn.dataset.i), 1); renderFileList(); });
    });
    uploadBtn.disabled = selectedFiles.length === 0;
  }

  function showError(msg) { errorBox.textContent = '⚠️ ' + msg; errorBox.classList.add('show'); }
  function hideError() { errorBox.classList.remove('show'); }
  function setProgress(pct) { progressFill.style.width = pct + '%'; progressPct.textContent = pct + '%'; }

  uploadBtn.addEventListener('click', async () => {
    const secret = getSecret();
    if (!secret) { showError('비밀키를 입력해주세요.'); return; }
    if (!selectedFiles.length) { showError('파일을 선택해주세요.'); return; }

    hideError();
    resultBox.innerHTML = '';
    resultBox.classList.remove('show');
    progressWrap.classList.add('show');
    uploadBtn.disabled = true;

    const results = [];

    // ── 데모 모드
    if (isDemo()) {
      for (let i = 0; i < selectedFiles.length; i++) {
        const file = selectedFiles[i];
        progressText.textContent = `(${i + 1}/${selectedFiles.length}) ${file.name} 업로드 중...`;
        setProgress(0);
        await new Promise(r => setTimeout(r, 300));
        for (let p = 10; p <= 100; p += 10) {
          setProgress(p);
          await new Promise(r => setTimeout(r, 120));
        }
        results.push({
          name: file.name,
          url: `https://example.r2.dev/uploads/2026-05-17/${encodeURIComponent(file.name)}`,
          size: file.size,
        });
      }
      progressText.textContent = '✅ 모든 파일 업로드 완료! (데모)';
      setProgress(100);
      results.forEach(r => resultBox.appendChild(makeFcard(r)));
      resultBox.classList.add('show');
      selectedFiles = [];
      renderFileList();
      setTimeout(() => progressWrap.classList.remove('show'), 1500);
      return;
    }

    // ── 실제 업로드

    for (let i = 0; i < selectedFiles.length; i++) {
      const file = selectedFiles[i];
      progressText.textContent = `(${i + 1}/${selectedFiles.length}) ${file.name} 업로드 중...`;
      setProgress(0);
      try {
        const signRes = await fetch(`${WORKER_URL}/upload-sign`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Secret-Key': secret },
          body: JSON.stringify({ filename: file.name, contentType: file.type || 'application/octet-stream', size: file.size }),
        });
        if (!signRes.ok) {
          const err = await signRes.json().catch(() => ({ error: '비밀키가 올바르지 않거나 서버 오류입니다.' }));
          throw new Error(err.error || '서명 실패');
        }
        const { uploadUrl, downloadUrl } = await signRes.json();
        await uploadWithProgress(file, uploadUrl, pct => setProgress(pct));
        results.push({ name: file.name, url: downloadUrl, size: file.size });
        setProgress(100);
      } catch (e) {
        showError(`${file.name}: ${e.message}`);
        progressWrap.classList.remove('show');
        uploadBtn.disabled = false;
        return;
      }
    }

    progressText.textContent = '✅ 모든 파일 업로드 완료!';
    setProgress(100);
    results.forEach(r => resultBox.appendChild(makeFcard(r)));
    resultBox.classList.add('show');
    selectedFiles = [];
    renderFileList();
    setTimeout(() => progressWrap.classList.remove('show'), 1500);
  });

  function uploadWithProgress(file, url, onProgress) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('PUT', url);
      xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');
      xhr.upload.addEventListener('progress', e => { if (e.lengthComputable) onProgress(Math.round(e.loaded / e.total * 100)); });
      xhr.addEventListener('load', () => { if (xhr.status >= 200 && xhr.status < 300) resolve(); else reject(new Error('HTTP ' + xhr.status)); });
      xhr.addEventListener('error', () => reject(new Error('네트워크 오류')));
      xhr.send(file);
    });
  }

  // ── 파일 목록 탭
  const listContent = document.getElementById('listContent');
  const listCount = document.getElementById('listCount');
  const listErrorBox = document.getElementById('listErrorBox');

  document.getElementById('refreshBtn').addEventListener('click', loadList);

  async function loadList() {
    const secret = getSecret();
    if (!secret) {
      listContent.innerHTML = '<div class="list-empty">비밀키를 입력하고 새로고침을 눌러주세요 🔑</div>';
      return;
    }
    listErrorBox.classList.remove('show');
    listContent.innerHTML = '<div class="list-loading">⏳ 불러오는 중...</div>';
    listCount.textContent = '불러오는 중...';

    try {
      const res = await fetch(`${WORKER_URL}/upload-list`, {
        headers: { 'X-Secret-Key': secret }
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: '오류가 발생했습니다.' }));
        throw new Error(err.error || '목록 불러오기 실패');
      }
      const { files } = await res.json();

      if (!files || files.length === 0) {
        listContent.innerHTML = '<div class="list-empty">업로드된 파일이 없습니다 📭</div>';
        listCount.textContent = '파일 없음';
        return;
      }

      listCount.textContent = `총 ${files.length}개 파일`;

      // 날짜별 그룹핑 (key: uploads/YYYY-MM-DD/파일명)
      const grouped = {};
      files.forEach(f => {
        const parts = f.key.split('/');
        const date = parts[1] || '날짜 없음';
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(f);
      });

      const container = document.createElement('div');
      container.className = 'list-items';

      Object.keys(grouped).sort((a, b) => b.localeCompare(a)).forEach(date => {
        const divider = document.createElement('div');
        divider.className = 'date-divider';
        divider.textContent = date;
        container.appendChild(divider);
        grouped[date].forEach(f => {
          const filename = decodeURIComponent(f.key.split('/').pop());
          container.appendChild(makeFcard({ name: filename, url: f.url, size: f.size }));
        });
      });

      listContent.innerHTML = '';
      listContent.appendChild(container);
    } catch (e) {
      listErrorBox.textContent = '⚠️ ' + e.message;
      listErrorBox.classList.add('show');
      listContent.innerHTML = '';
    }
  }
</script>

</body>
</html>
